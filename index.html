<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>婚礼邀请函</title>
<meta property="og:title" content="张三 ♥ 李四 · 婚礼邀请">
<meta property="og:description" content="诚邀您参加我们的婚礼 2026.10.01">
<meta property="og:image" content="https://你的用户名.github.io/wedding-invite/cover.jpg">
<style>
body { margin:0; font-family:"PingFang SC","Microsoft YaHei",sans-serif;
       background:#fdf6f0; color:#5a3e36; text-align:center; }
.hero { padding:60px 20px 40px; background:linear-gradient(135deg,#f8e8df,#fff5ee); }
.hero h1 { font-size:2rem; margin:.5em 0; }
.time { margin:20px 0; font-size:1.1rem; }
.btn { display:inline-block; margin:30px auto; padding:12px 28px;
       background:#c9a89c; color:#fff; border-radius:24px; text-decoration:none; }

/* 音乐控制按钮 - 固定在右下角 */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid rgba(201,168,156,0.6);
  background: rgba(255,255,255,0.95);
  color: #c9a89c;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  outline: none;
}

#musicBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

/* 音符旋转动画（播放时） */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

#musicBtn.playing {
  animation: spin 3s linear infinite;
  border-color: #c9a89c;
}
</style>
</head>
<body>

<!-- 背景音乐 -->
<audio id="bgm" src="./bg-music.mp3" loop preload="auto"></audio>

<!-- 音乐控制按钮 -->
<button id="musicBtn">🎵</button>

<div class="hero">
  <p>💍 我们结婚啦</p>
  <h1>张三 &amp; 李四</h1>
  <div class="time">📅 2026年10月01日（周四） 11:18</div>
  <div>📍 XX酒店 · 三层宴会厅</div>
  <a class="btn" href="https://uri.amap.com/marker?position=116.391,39.907&name=XX酒店">📍 导航到此</a>
</div>

<script>
var audio = document.getElementById('bgm');
var btn = document.getElementById('musicBtn');
var isPlaying = false;

// iOS 微信 AudioContext unlock
function unlockAudio() {
  var ctx = new (window.AudioContext || window.webkitAudioContext)();
  var source = ctx.createBufferSource();
  source.buffer = ctx.createBuffer(1, 1, 44100);
  source.connect(ctx.destination);
  source.start(0);
  if (ctx.state === 'suspended') {
    ctx.resume();
  }
}

// 播放音乐
function playMusic() {
  if (isPlaying) return;
  
  unlockAudio(); // iOS 微信解锁
  
  audio.play().then(function() {
    isPlaying = true;
    btn.textContent = '♪';
    btn.classList.add('playing');
  }).catch(function(e) {
    console.log('播放失败:', e);
  });
}

// 暂停音乐
function pauseMusic() {
  audio.pause();
  isPlaying = false;
  btn.textContent = '🎵';
  btn.classList.remove('playing');
}

// 切换播放/暂停
function toggleMusic() {
  if (isPlaying) {
    pauseMusic();
  } else {
    playMusic();
  }
}

// 按钮点击事件
btn.addEventListener('click', function(e) {
  e.stopPropagation();
  toggleMusic();
});

// 页面加载完成后，用户首次点击任意位置自动播放
var firstClickHandler = function() {
  playMusic();
  document.removeEventListener('click', firstClickHandler);
  document.removeEventListener('touchend', firstClickHandler);
};

document.addEventListener('click', firstClickHandler, { once: true });
document.addEventListener('touchend', firstClickHandler, { once: true });

// 页面可见性变化时，如果音乐在播放，继续播放
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && isPlaying && audio.paused) {
    audio.play().catch(function(){});
  }
});
</script>

</body>
</html>
